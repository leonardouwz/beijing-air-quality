<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contrataciones Perú — Red de Relaciones</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg:      #f8f9fc;
    --panel:   #ffffff;
    --border:  #e4e7f0;
    --ink:     #111827;
    --ink-dim: #6b7280;
    --accent:  #7c3aed;
    --comp:    #3b82f6;
    --prov:    #f97316;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); font-family: 'Plus Jakarta Sans', system-ui, sans-serif; color: var(--ink); overflow: hidden; }

  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ── Header ─────────────────────────────────────────────────────────── */
  header {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 8px 18px;
    background: var(--panel);
    border-bottom: 2px solid var(--border);
    box-shadow: 0 1px 6px rgba(124,58,237,.06);
  }
  header h1 { font-size: 15px; font-weight: 800; letter-spacing: -.02em; white-space: nowrap; }
  header h1 small { color: var(--ink-dim); font-weight: 400; font-size: 11px; display: block; }
  .spacer { flex: 1; min-width: 8px; }

  .stat { font-size: 11px; color: var(--ink-dim); line-height: 1.5; white-space: nowrap; }
  .stat strong { color: var(--ink); font-weight: 600; }

  .divider { width: 1px; height: 26px; background: var(--border); }

  .label-sm { font-size: 11px; color: var(--ink-dim); font-weight: 600; white-space: nowrap; }

  .toggle-group { display: flex; gap: 4px; }
  .toggle-btn {
    font-family: inherit; font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--panel); color: var(--ink-dim); cursor: pointer;
    transition: all .15s;
  }
  .toggle-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .nav-link {
    font-size: 11px; color: var(--accent); text-decoration: none;
    font-weight: 600; white-space: nowrap;
  }

  /* ── Body ────────────────────────────────────────────────────────────── */
  .body { flex: 1; display: flex; overflow: hidden; min-height: 0; }

  /* ── Graph area ──────────────────────────────────────────────────────── */
  #graph-area { flex: 1; position: relative; overflow: hidden; }

  #graph-svg { width: 100%; height: 100%; display: block; cursor: grab; }
  #graph-svg:active { cursor: grabbing; }

  /* ── Tooltip ─────────────────────────────────────────────────────────── */
  #tooltip {
    position: absolute; pointer-events: none; display: none; z-index: 200;
    background: var(--panel); border: 1.5px solid var(--border); border-radius: 8px;
    padding: 10px 13px; font-size: 12px; line-height: 1.65;
    box-shadow: 0 4px 18px rgba(0,0,0,.13); max-width: 250px;
  }
  .tt-title { font-weight: 700; font-size: 13px; margin-bottom: 5px; word-break: break-word; }
  .tt-tag {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 1px 8px; border-radius: 99px; margin-bottom: 5px;
  }
  .tt-comp { background: #dbeafe; color: #1d4ed8; }
  .tt-prov { background: #ffedd5; color: #c2410c; }
  .tt-edge { background: #f3e8ff; color: #7c3aed; }
  .tt-row { color: var(--ink-dim); }
  .tt-row b { color: var(--ink); }

  /* ── Legend ──────────────────────────────────────────────────────────── */
  #legend {
    position: absolute; bottom: 16px; left: 16px; z-index: 100;
    background: var(--panel); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    font-size: 11px; box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  .leg-title { font-weight: 700; margin-bottom: 6px; color: var(--ink-dim); }
  .leg-row { display: flex; align-items: center; gap: 7px; margin: 3px 0; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 10px; }

  /* ── Right panel ─────────────────────────────────────────────────────── */
  #right-panel {
    flex: 0 0 300px; background: var(--panel);
    border-left: 1.5px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .panel-hdr {
    padding: 11px 16px; border-bottom: 1.5px solid var(--border);
    font-size: 11px; font-weight: 700; color: var(--ink-dim);
    text-transform: uppercase; letter-spacing: .07em; flex: 0 0 auto;
  }
  .panel-body { flex: 1; overflow-y: auto; padding: 14px; }

  /* Empty state */
  .empty-st {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; color: var(--ink-dim);
    text-align: center; gap: 10px; padding: 20px;
  }
  .empty-st .ico { font-size: 32px; opacity: .3; }
  .empty-st p { font-size: 12px; line-height: 1.65; max-width: 210px; }

  /* Detail cards */
  .d-card {
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 11px 12px; margin-bottom: 10px;
  }
  .d-card-title {
    font-size: 10px; font-weight: 700; color: var(--ink-dim);
    text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px;
  }
  .d-row {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 12px; padding: 2px 0; gap: 8px;
  }
  .d-k { color: var(--ink-dim); flex-shrink: 0; }
  .d-v { font-weight: 600; color: var(--ink); text-align: right; }

  .entity-name {
    font-weight: 700; font-size: 14px; margin: 8px 0 3px;
    line-height: 1.35; word-break: break-word;
  }
  .entity-sub { font-size: 11px; color: var(--ink-dim); margin-bottom: 2px; }

  .pill {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 9px; border-radius: 99px; font-size: 11px; font-weight: 700;
  }
  .pill-comp { background: #dbeafe; color: #1d4ed8; }
  .pill-prov { background: #ffedd5; color: #c2410c; }
  .pill-edge { background: #f3e8ff; color: #7c3aed; }
  .pill-r0   { background: #f3f4f6; color: #6b7280; }
  .pill-r1   { background: #fef9c3; color: #a16207; }
  .pill-r2   { background: #ffedd5; color: #c2410c; }
  .pill-r3   { background: #fee2e2; color: #dc2626; }

  .neigh-row {
    display: flex; align-items: center; font-size: 12px;
    padding: 4px 0; border-bottom: 1px solid var(--border); gap: 6px;
  }
  .neigh-row:last-child { border-bottom: none; }
  .neigh-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--ink-dim); }
  .neigh-monto { font-weight: 600; color: var(--ink); white-space: nowrap; flex-shrink: 0; }
  .neigh-link  { font-size: 10px; color: var(--accent); cursor: pointer; flex-shrink: 0; text-decoration: underline; background: none; border: none; font-family: inherit; font-weight: 600; padding: 0; }

  /* Loading overlay */
  #loading {
    position: absolute; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; z-index: 300;
    font-size: 13px; color: var(--ink-dim);
  }
  .spin {
    width: 28px; height: 28px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Contrataciones Perú
      <small>Red comprador → proveedor · SEACE 2025</small>
    </h1>
    <div class="spacer"></div>
    <div class="stat" id="stat-box">Cargando…</div>
    <div class="divider"></div>
    <span class="label-sm">Color:</span>
    <div class="toggle-group">
      <button class="toggle-btn active" id="btn-tipo"   onclick="setColor('tipo')">Tipo</button>
      <button class="toggle-btn"        id="btn-riesgo" onclick="setColor('riesgo')">Riesgo</button>
    </div>
    <div class="divider"></div>
    <a class="nav-link" href="index.html">← PCA</a>
  </header>

  <div class="body">
    <div id="graph-area">
      <svg id="graph-svg"></svg>
      <div id="tooltip"></div>
      <div id="legend"></div>
      <div id="loading">
        <div class="spin"></div>
        <span>Calculando disposición del grafo…</span>
      </div>
    </div>

    <div id="right-panel">
      <div class="panel-hdr">Detalle</div>
      <div class="panel-body" id="panel-body">
        <div class="empty-st">
          <div class="ico">🔍</div>
          <p>Haz clic en un nodo o en una arista para ver sus detalles aquí.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="vendor/d3.v7.min.js"></script>
<script src="data/graph_data.js"></script>
<script>
"use strict";

// ── Constantes de color ──────────────────────────────────────────────────────
const COMP_COLOR  = "#3b82f6";
const PROV_COLOR  = "#f97316";
const RISK_COLORS = ["#d1d5db", "#fde068", "#fb923c", "#ef4444"];
const RISK_LABELS = ["Sin riesgo", "Riesgo leve", "Riesgo medio", "Riesgo alto"];
// Colores de arista más oscuros que los de nodo para que sean visibles sobre fondo blanco
const EDGE_COLORS = ["#94a3b8", "#ca8a04", "#ea580c", "#dc2626"];

let colorMode = "tipo";

function nodeColor(d) {
  if (colorMode === "tipo")
    return d.tipo === "comprador" ? COMP_COLOR : PROV_COLOR;
  return RISK_COLORS[Math.min(3, Math.round(d.avg_riesgo || 0))];
}
function edgeStroke(d)   { return EDGE_COLORS[Math.min(3, d.max_riesgo || 0)]; }
function edgeOpacity(d)  { return d.max_riesgo > 0 ? 0.80 : 0.50; }

// ── Escalas ──────────────────────────────────────────────────────────────────
const DATA = window.GRAPH_DATA;
const montos = DATA.nodes.map(n => n.total_monto);
const sizeScale = d3.scaleSqrt()
  .domain([0, d3.quantile(montos.slice().sort(d3.ascending), 0.95) || 1])
  .range([4, 18])
  .clamp(true);

const edgeMontos = DATA.edges.map(e => e.total_monto);
const edgeWidthScale = d3.scaleSqrt()
  .domain([0, d3.quantile(edgeMontos.slice().sort(d3.ascending), 0.90) || 1])
  .range([1.2, 5])
  .clamp(true);

// ── SVG + zoom ────────────────────────────────────────────────────────────────
const svg  = d3.select("#graph-svg");
const gAll = svg.append("g");
const gLinks = gAll.append("g");
const gNodes = gAll.append("g");

const zoom = d3.zoom().scaleExtent([0.05, 10])
  .on("zoom", e => gAll.attr("transform", e.transform));
svg.call(zoom);

// ── Preparar datos de simulación ANTES de crear las selecciones ───────────────
// nodeById y simEdges deben existir antes de que link se vincule,
// porque el tick accede a d.source.x / d.target.x (objetos nodo, no strings).
const nodeById = new Map(DATA.nodes.map(d => [d.id, d]));
const simEdges = DATA.edges
  .map(d => ({ ...d, source: nodeById.get(d.source), target: nodeById.get(d.target) }))
  .filter(d => d.source && d.target);

// ── Aristas (vinculadas a simEdges, no a DATA.edges) ──────────────────────────
const link = gLinks.selectAll("line")
  .data(simEdges)
  .join("line")
  .attr("stroke",         edgeStroke)
  .attr("stroke-opacity", edgeOpacity)
  .attr("stroke-width",   d => edgeWidthScale(d.total_monto))
  .style("cursor", "pointer");

// ── Nodos ─────────────────────────────────────────────────────────────────────
const node = gNodes.selectAll("circle")
  .data(DATA.nodes)
  .join("circle")
  .attr("r",            d => sizeScale(d.total_monto))
  .attr("fill",         nodeColor)
  .attr("stroke",       "#fff")
  .attr("stroke-width", 1.5)
  .style("cursor", "pointer");

// ── Simulación ───────────────────────────────────────────────────────────────

const sim = d3.forceSimulation(DATA.nodes)
  .force("link",    d3.forceLink(simEdges).id(d => d.id).distance(45).strength(0.6))
  .force("charge",  d3.forceManyBody().strength(-120))
  .force("center",  d3.forceCenter(0, 0))
  .force("collide", d3.forceCollide(d => sizeScale(d.total_monto) + 1.5))
  .on("tick", () => {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("cx", d => d.x).attr("cy", d => d.y);
  });

// Centrar y ocultar loading cuando estabiliza
sim.on("end", () => {
  const bb = gAll.node().getBBox();
  const sw = svg.node().clientWidth  || 800;
  const sh = svg.node().clientHeight || 600;
  const s  = Math.min(sw / (bb.width + 100), sh / (bb.height + 100), 1.4);
  const tx = sw / 2 - s * (bb.x + bb.width  / 2);
  const ty = sh / 2 - s * (bb.y + bb.height / 2);
  svg.transition().duration(700)
     .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(s));
  document.getElementById("loading").style.display = "none";
});

// ── Drag ──────────────────────────────────────────────────────────────────────
node.call(d3.drag()
  .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
  .on("drag",  (e, d) => { d.fx = e.x; d.fy = e.y; })
  .on("end",   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
);

// ── Utilidades ────────────────────────────────────────────────────────────────
function fmtS(n) {
  if (n >= 1e9) return "S/ " + (n / 1e9).toFixed(2) + " B";
  if (n >= 1e6) return "S/ " + (n / 1e6).toFixed(1) + " M";
  if (n >= 1e3) return "S/ " + (n / 1e3).toFixed(0) + " K";
  return "S/ " + n.toFixed(0);
}
function riskPill(r) {
  return `<span class="pill pill-r${r}">${RISK_LABELS[r]}</span>`;
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tt   = document.getElementById("tooltip");
const area = document.getElementById("graph-area");

function positionTT(e) {
  const b = area.getBoundingClientRect();
  let x = e.clientX - b.left + 14;
  let y = e.clientY - b.top  - 8;
  if (x + 260 > b.width)  x = e.clientX - b.left - 264;
  if (y + 140 > b.height) y = e.clientY - b.top  - 150;
  tt.style.left = x + "px";
  tt.style.top  = y + "px";
}

node
  .on("mousemove", (e, d) => {
    const r = Math.min(3, Math.round(d.avg_riesgo || 0));
    const tag = d.tipo === "comprador"
      ? `<span class="tt-tag tt-comp">🏛 Comprador</span>`
      : `<span class="tt-tag tt-prov">🏢 Proveedor</span>`;
    tt.innerHTML = `
      <div class="tt-title">${d.label}</div>
      ${tag}
      <div class="tt-row"><b>${fmtS(d.total_monto)}</b> total</div>
      <div class="tt-row">${d.n_contratos} contrato${d.n_contratos !== 1 ? "s" : ""}</div>
      ${d.dept ? `<div class="tt-row">${d.dept}</div>` : ""}
      <div class="tt-row">Riesgo prom: <b>${RISK_LABELS[r]}</b></div>
    `;
    positionTT(e); tt.style.display = "block";
  })
  .on("mouseleave", () => { tt.style.display = "none"; });

link
  .on("mousemove", (e, d) => {
    tt.innerHTML = `
      <div class="tt-title" style="font-size:12px">
        ${d.source.label || d.source.id} → ${d.target.label || d.target.id}
      </div>
      <span class="tt-tag tt-edge">📄 Relación</span>
      <div class="tt-row"><b>${fmtS(d.total_monto)}</b> · ${d.n_contratos} contrato${d.n_contratos !== 1 ? "s" : ""}</div>
      <div class="tt-row">Método: <b>${d.metodo || "—"}</b></div>
      <div class="tt-row">Riesgo máx: ${riskPill(d.max_riesgo)}</div>
    `;
    positionTT(e); tt.style.display = "block";
  })
  .on("mouseleave", () => { tt.style.display = "none"; });

// ── Selección y paneles ───────────────────────────────────────────────────────
let selected = null;

function setHighlight(keepNodes, keepLinks) {
  node.attr("opacity",      n => keepNodes.has(n) ? 1 : 0.12)
      .attr("stroke",       n => keepNodes.has(n) && n === selected?.data ? "#7c3aed" : "#fff")
      .attr("stroke-width", n => n === selected?.data ? 3 : 1.5);
  link.attr("opacity", l => keepLinks.has(l) ? 0.85 : 0.05);
}
function clearHighlight() {
  node.attr("opacity", 1).attr("stroke", "#fff").attr("stroke-width", 1.5);
  link.attr("opacity", edgeOpacity);
}
function clearSelection() {
  clearHighlight();
  selected = null;
  document.getElementById("panel-body").innerHTML = `
    <div class="empty-st">
      <div class="ico">🔍</div>
      <p>Haz clic en un nodo o arista para ver sus detalles aquí.</p>
    </div>`;
}

svg.on("click", clearSelection);

node.on("click", (e, d) => { e.stopPropagation(); tt.style.display = "none"; selectNode(d); });
link.on("click", (e, d) => { e.stopPropagation(); tt.style.display = "none"; selectEdge(d); });

function selectNode(d) {
  selected = { type: "node", data: d };
  const neighbors = new Set();
  const adjLinks  = new Set();
  simEdges.forEach(l => {
    if (l.source === d || l.target === d) {
      adjLinks.add(l);
      neighbors.add(l.source === d ? l.target : l.source);
    }
  });
  neighbors.add(d);
  setHighlight(neighbors, adjLinks);
  renderNodePanel(d);
}

function selectEdge(d) {
  selected = { type: "edge", data: d };
  setHighlight(new Set([d.source, d.target]), new Set([d]));
  renderEdgePanel(d);
}

function selectNodeById(id) {
  const d = nodeById.get(id);
  if (d) selectNode(d);
}
window.selectNodeById = selectNodeById;

// ── Panel: nodo ───────────────────────────────────────────────────────────────
function renderNodePanel(d) {
  const r = Math.min(3, Math.round(d.avg_riesgo || 0));
  const tag = d.tipo === "comprador"
    ? `<span class="pill pill-comp">🏛 Comprador</span>`
    : `<span class="pill pill-prov">🏢 Proveedor</span>`;

  // Vecinos ordenados por monto
  const pairs = simEdges
    .filter(l => l.source === d || l.target === d)
    .map(l => ({ node: l.source === d ? l.target : l.source, edge: l }))
    .sort((a, b) => b.edge.total_monto - a.edge.total_monto)
    .slice(0, 8);

  const neighborRows = pairs.map(({ node: n, edge: l }) => `
    <div class="neigh-row">
      <span class="neigh-label" title="${n.label}">${n.label}</span>
      <span class="neigh-monto">${fmtS(l.total_monto)}</span>
      <button class="neigh-link" onclick="selectNodeById('${n.id}')">ver</button>
    </div>`).join("");

  document.getElementById("panel-body").innerHTML = `
    <div style="margin-bottom:12px">
      ${tag}
      <div class="entity-name">${d.label}</div>
      ${d.dept ? `<div class="entity-sub">${d.dept}</div>` : ""}
      ${d.id !== d.label ? `<div class="entity-sub" style="font-family:monospace;font-size:10px">${d.id}</div>` : ""}
    </div>

    <div class="d-card">
      <div class="d-card-title">Resumen financiero</div>
      <div class="d-row"><span class="d-k">Monto total</span><span class="d-v">${fmtS(d.total_monto)}</span></div>
      <div class="d-row"><span class="d-k">Contratos</span><span class="d-v">${d.n_contratos}</span></div>
      <div class="d-row"><span class="d-k">Riesgo prom.</span><span class="d-v">${riskPill(r)}</span></div>
    </div>

    ${pairs.length ? `
    <div class="d-card">
      <div class="d-card-title">${d.tipo === "comprador" ? "Proveedores" : "Compradores"} principales</div>
      ${neighborRows}
    </div>` : ""}
  `;
}

// ── Panel: arista ─────────────────────────────────────────────────────────────
function renderEdgePanel(d) {
  document.getElementById("panel-body").innerHTML = `
    <div style="margin-bottom:12px">
      <span class="pill pill-edge">📄 Relación contractual</span>
      <div class="entity-name" style="font-size:13px;margin-top:8px">
        ${d.source.label || d.source.id}
        <span style="color:var(--ink-dim);font-weight:400"> → </span>
        ${d.target.label || d.target.id}
      </div>
    </div>

    <div class="d-card">
      <div class="d-card-title">Resumen</div>
      <div class="d-row"><span class="d-k">Monto total</span><span class="d-v">${fmtS(d.total_monto)}</span></div>
      <div class="d-row"><span class="d-k">Contratos</span><span class="d-v">${d.n_contratos}</span></div>
      <div class="d-row"><span class="d-k">Método</span><span class="d-v">${d.metodo || "—"}</span></div>
    </div>

    <div class="d-card">
      <div class="d-card-title">Indicadores de riesgo</div>
      <div class="d-row"><span class="d-k">Riesgo máximo</span><span class="d-v">${riskPill(d.max_riesgo)}</span></div>
      <div class="d-row"><span class="d-k">Riesgo promedio</span><span class="d-v">${d.avg_riesgo.toFixed(2)}</span></div>
      <div class="d-row"><span class="d-k">Total alertas</span>
        <span class="d-v" style="color:${d.n_alertas > 0 ? "#dc2626" : "var(--ink-dim)"}">
          ${d.n_alertas}
        </span>
      </div>
    </div>

    <div class="d-card">
      <div class="d-card-title">Entidades</div>
      <div class="d-row" style="align-items:center">
        <span class="d-k">Comprador</span>
        <button class="neigh-link" onclick="selectNodeById('${d.source.id}')">ver nodo →</button>
      </div>
      <div style="font-size:12px;font-weight:600;margin-bottom:10px;word-break:break-word">${d.source.label || d.source.id}</div>
      <div class="d-row" style="align-items:center">
        <span class="d-k">Proveedor</span>
        <button class="neigh-link" onclick="selectNodeById('${d.target.id}')">ver nodo →</button>
      </div>
      <div style="font-size:12px;font-weight:600;word-break:break-word">${d.target.label || d.target.id}</div>
    </div>
  `;
}

// ── Color toggle ──────────────────────────────────────────────────────────────
function setColor(mode) {
  colorMode = mode;
  document.getElementById("btn-tipo").classList.toggle("active",   mode === "tipo");
  document.getElementById("btn-riesgo").classList.toggle("active", mode === "riesgo");
  node.attr("fill", nodeColor);
  renderLegend();
}

// ── Leyenda ───────────────────────────────────────────────────────────────────
function renderLegend() {
  const leg = document.getElementById("legend");
  if (colorMode === "tipo") {
    leg.innerHTML = `
      <div class="leg-title">Tipo de entidad</div>
      <div class="leg-row"><div class="leg-dot" style="background:${COMP_COLOR}"></div> Comprador (entidad pública)</div>
      <div class="leg-row"><div class="leg-dot" style="background:${PROV_COLOR}"></div> Proveedor (empresa)</div>
      <div style="margin-top:8px;border-top:1px solid var(--border);padding-top:7px">
      <div class="leg-title">Grosor de arista</div>
      <div style="font-size:10px;color:var(--ink-dim);line-height:1.5">Proporcional al nº de contratos</div>
      <div class="leg-title" style="margin-top:6px">Color de arista</div>
      ${RISK_LABELS.map((l, i) => `<div class="leg-row"><div style="width:22px;height:3px;background:${EDGE_COLORS[i]};border-radius:2px"></div>${l}</div>`).join("")}
      </div>
    `;
  } else {
    leg.innerHTML = `
      <div class="leg-title">Riesgo promedio del nodo</div>
      ${RISK_LABELS.map((l, i) => `<div class="leg-row"><div class="leg-dot" style="background:${RISK_COLORS[i]}"></div>${l}</div>`).join("")}
    `;
  }
}
renderLegend();

// ── Estadísticas en header ────────────────────────────────────────────────────
const m = DATA.meta;
document.getElementById("stat-box").innerHTML = `
  <strong>${m.n_compradores}</strong> compradores &nbsp;·&nbsp;
  <strong>${m.n_proveedores}</strong> proveedores &nbsp;·&nbsp;
  <strong>${m.n_aristas}</strong> relaciones &nbsp;·&nbsp;
  <strong>${fmtS(m.monto_total)}</strong> total
`;
</script>
</body>
</html>
