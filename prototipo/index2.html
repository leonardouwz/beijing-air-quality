<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AIR::MONITOR — Beijing PM2.5 Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#06090b; --panel:#0b1013; --edge:#16211d; --ink:#c6d6cc; --ink-dim:#5d6f66;
    --grid:#13201a; --green:#36e08a; --sel:#ffb454; --hist-pop:#1b2a22;
    --mono:"JetBrains Mono","Cascadia Mono",Consolas,ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; height:100%; background:var(--bg); color:var(--ink); font-family:var(--mono); overflow:hidden;}
  body::before{content:""; position:fixed; inset:0; pointer-events:none; z-index:1; opacity:.5;
    background:repeating-linear-gradient(0deg, rgba(54,224,138,.025) 0 1px, transparent 1px 3px);}
  #app{position:relative; z-index:2; display:flex; flex-direction:column; height:100vh;}

  header.bar{display:flex; align-items:center; gap:18px; padding:9px 16px; border-bottom:1px solid var(--edge);
    background:#080c0e; font-size:12px; flex:0 0 auto;}
  .brand{font-weight:700; letter-spacing:.12em; color:var(--green); white-space:nowrap;}
  .brand .cur{animation:blink 1.1s steps(1) infinite;} @keyframes blink{50%{opacity:0;}}
  .bar .sub{color:var(--ink-dim); font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:330px;}
  .bar .sp{flex:1;}
  .bar label{color:var(--ink-dim); font-size:10px; letter-spacing:.1em; text-transform:uppercase; margin-right:5px;}
  select,button{font-family:var(--mono); font-size:12px; background:#0c1316; color:var(--ink);
    border:1px solid var(--edge); border-radius:0; padding:5px 8px; cursor:pointer;}
  select:hover,button:hover{border-color:var(--green); color:var(--green);}
  .legend{display:flex; gap:12px;} .legend .lg{display:flex; align-items:center; gap:5px; color:var(--ink-dim); font-size:11px;}
  .dot{width:8px; height:8px;}
  .gstat{font-size:11px; color:var(--ink-dim);} .gstat b{color:var(--ink);}

  main{flex:1; display:grid; grid-template-columns:392px minmax(0,1fr); gap:1px; background:var(--edge); min-height:0;}
  .stack{background:var(--bg); display:flex; flex-direction:column; gap:1px; min-height:0;}
  .cell{background:var(--panel); flex:1; min-height:0; display:flex; flex-direction:column; padding:7px 10px 2px;}
  .cell .ttl{font-size:11px; letter-spacing:.06em; color:var(--ink-dim); margin-bottom:2px;}
  .cell .ttl b{color:var(--green); font-weight:700; margin-right:6px;}
  .cell .plot{flex:1; position:relative; min-height:0;}

  .right{background:var(--bg); display:flex; flex-direction:column; min-height:0;}
  .scatterhead{padding:8px 12px 0; display:flex; align-items:baseline; gap:10px;}
  .scatterhead .h{font-size:12px; letter-spacing:.08em; color:var(--green); font-weight:700;}
  .scatterhead .pcsub{font-size:10.5px; color:var(--ink-dim);}
  .scatterbody{flex:1; position:relative; min-height:0; margin:6px 10px;}
  .plot canvas,.plot svg,.scatterbody canvas,.scatterbody svg{position:absolute; top:0; left:0;}
  .loadings{padding:4px 12px 6px; font-size:10px; color:var(--ink-dim); line-height:1.5; border-top:1px dashed var(--edge);}
  .loadings b{color:var(--green);} .loadings code{color:var(--ink);}
  .selbar{position:absolute; top:8px; right:8px; z-index:5; background:rgba(8,12,14,.92); border:1px solid var(--edge);
    padding:8px 10px; font-size:11px; color:var(--ink-dim); min-width:178px;}
  .selbar .row{display:flex; justify-content:space-between; gap:10px; padding:1px 0;}
  .selbar .row b, .selbar .row span:last-child{color:var(--green); font-variant-numeric:tabular-nums;}
  .selbar .hint{font-size:10px; margin-top:3px; color:var(--ink-dim);}

  .axis text{fill:var(--ink-dim); font:10px var(--mono);}
  .axis path,.axis line{stroke:var(--grid);}
  .brush .selection{stroke:var(--green); fill:var(--green); fill-opacity:.07;}
  .tooltip{position:fixed; pointer-events:none; z-index:50; display:none; background:#0a0f11; border:1px solid var(--green);
    padding:8px 10px; font-size:11px; box-shadow:0 0 22px rgba(54,224,138,.18); max-width:240px;}
  .tooltip b{color:var(--green);} .tooltip table{border-collapse:collapse; margin-top:4px;} .tooltip td{padding:1px 6px 1px 0;}
  .tooltip td.k{color:var(--ink-dim);} .tooltip td.v{text-align:right;}
  #loader{position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; background:var(--bg); color:var(--ink-dim); font-size:12px;}
  .spin{width:28px;height:28px;border:2px solid var(--edge);border-top-color:var(--green);border-radius:50%;animation:s .8s linear infinite;}
  @keyframes s{to{transform:rotate(360deg);}} #err{color:var(--sel); max-width:520px; text-align:center;}
</style>
</head>
<body>
<div id="app">
  <header class="bar">
    <span class="brand">◢ AIR::MONITOR<span class="cur">▍</span></span>
    <span class="sub" id="subtitle"></span>
    <span class="sp"></span>
    <span><label>data</label><select id="dataset"><option value="treated" selected>tratado</option><option value="raw">crudo</option></select></span>
    <span><label>color</label><select id="colorBy"><option value="season" selected>estación</option><option value="period">periodo</option><option value="zona">zona</option></select></span>
    <span class="legend" id="legend"></span>
    <button id="reset">CLR</button>
    <span class="gstat" id="globalStat"></span>
  </header>

  <main>
    <!-- Distribuciones apiladas a la izquierda -->
    <div class="stack">
      <div class="cell"><div class="ttl"><b>B</b>PM2.5 · µg/m³</div><div class="plot" id="plotB"><svg id="svgB"></svg></div></div>
      <div class="cell"><div class="ttl"><b>C</b>DEWP · punto de rocío °C</div><div class="plot" id="plotC"><svg id="svgC"></svg></div></div>
      <div class="cell"><div class="ttl"><b>D</b>serie PM2.5 · 2013→2026</div><div class="plot" id="plotD"><canvas id="canvasD"></canvas><svg id="svgD"></svg></div></div>
    </div>
    <!-- Scatter a la derecha -->
    <div class="right">
      <div class="scatterhead"><span class="h">[A] ESPACIO LATENTE PCA</span><span class="pcsub" id="pcaSub"></span></div>
      <div class="scatterbody" id="plotA"><canvas id="canvasA"></canvas><svg id="svgA"></svg>
        <div class="selbar" id="selbar"></div>
      </div>
      <div class="loadings" id="loadings"></div>
    </div>
  </main>
</div>
<div class="tooltip" id="tooltip"></div>
<div id="loader"><div class="spin"></div><div>booting PCA…</div><div id="err"></div></div>

<script>
  window.AQ_THEME = {
    season:["#5bb0ff","#36e08a","#ffb454","#c792ea"], period:["#5bb0ff","#ffb454"],
    zona:["#5bb0ff","#36e08a","#ffb454","#c792ea"],
    dim:"#37463e", sel:"#ffb454", dot:2.0, dotSel:3.0, baseAlpha:0.72, dimAlpha:0.26,
  };
</script>
<script src="vendor/d3.v7.min.js"></script>
<script src="data/aq_data.js"></script>
<script src="data/aq_data_raw.js"></script>
<script src="aq_app.js"></script>
</body>
</html>
